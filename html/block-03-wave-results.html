<!-- WAVE結果アコーディオン: カスタムHTMLブロックに貼り付け -->
<section class="section wave-results" id="wave-results">
  <div class="container">
    <div class="section-header">
      <p class="section-label">RESULTS</p>
      <h2 class="section-title">WAVE 結果</h2>
      <div class="divider-cross"></div>
      <p class="section-desc">各WAVEの結果記事はタグで自動表示されます</p>
    </div>

    <div class="hm-accordion" id="wave-accordion">

      <div class="hm-accordion-item" data-wave="1">
        <button class="hm-accordion-header" onclick="hmToggle(this)">
          <span>WAVE 1</span>
          <span class="hm-accordion-icon">▼</span>
        </button>
        <div class="hm-accordion-body">
          <ul class="wave-post-list">
            <li><a href="#">【WAVE1】○○ホール 結果レポート</a></li>
            <li><a href="#">【WAVE1】△△ホール 結果レポート</a></li>
            <li><a href="#">【WAVE1】□□ホール 結果レポート</a></li>
          </ul>
        </div>
      </div>

      <div class="hm-accordion-item" data-wave="2">
        <button class="hm-accordion-header" onclick="hmToggle(this)">
          <span>WAVE 2</span>
          <span class="hm-accordion-icon">▼</span>
        </button>
        <div class="hm-accordion-body">
          <p class="wave-post-empty">— WAVE 2 開催後に自動表示 —</p>
        </div>
      </div>

      <div class="hm-accordion-item" data-wave="3">
        <button class="hm-accordion-header" onclick="hmToggle(this)">
          <span>WAVE 3</span>
          <span class="hm-accordion-icon">▼</span>
        </button>
        <div class="hm-accordion-body">
          <p class="wave-post-empty">— WAVE 3 開催後に自動表示 —</p>
        </div>
      </div>

      <div class="hm-accordion-item" data-wave="4">
        <button class="hm-accordion-header" onclick="hmToggle(this)">
          <span>WAVE 4</span>
          <span class="hm-accordion-icon">▼</span>
        </button>
        <div class="hm-accordion-body">
          <p class="wave-post-empty">— WAVE 4 開催後に自動表示 —</p>
        </div>
      </div>

      <div class="hm-accordion-item" data-wave="5">
        <button class="hm-accordion-header" onclick="hmToggle(this)">
          <span>WAVE 5</span>
          <span class="hm-accordion-icon">▼</span>
        </button>
        <div class="hm-accordion-body">
          <p class="wave-post-empty">— WAVE 5 開催後に自動表示 —</p>
        </div>
      </div>

    </div>
  </div>
</section>

<script>
function hmToggle(btn) {
  var item = btn.closest('.hm-accordion-item');
  var body = item.querySelector('.hm-accordion-body');
  var icon = btn.querySelector('.hm-accordion-icon');
  var isOpen = item.classList.contains('open');
  document.querySelectorAll('.hm-accordion-item.open').forEach(function(el) {
    el.classList.remove('open');
    el.querySelector('.hm-accordion-body').style.maxHeight = '0';
    el.querySelector('.hm-accordion-icon').textContent = '▼';
  });
  if (!isOpen) {
    item.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 'px';
    icon.textContent = '▲';
  }
}
</script>
