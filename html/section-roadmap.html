<!-- ② 開催ロードマップ ─────────────────────────────────────
     WordPress「カスタムHTMLブロック」にそのまま貼り付けて使用してください。
     スタイルは css/hm-lp.css（または追加CSS）の .hm-roadmap-* クラスが適用されます。
     ──────────────────────────────────────────────────────── -->
<section class="hm-section">

  <h2 class="hm-section-title">開催ロードマップ</h2>
  <p class="hm-section-lead">Season1 ミリオンゴッド神堕とし編　5/10 〜 6/14</p>

  <div class="hm-roadmap-wrap">
    <div class="hm-roadmap">

      <!-- WAVE 1 -->
      <div class="hm-wave">
        <span class="hm-wave-label">WAVE</span>
        <span class="hm-wave-name">1</span>
        <span class="hm-wave-date">5/10</span>
      </div>

      <div class="hm-arrow" aria-hidden="true">›</div>

      <!-- WAVE 2 -->
      <div class="hm-wave">
        <span class="hm-wave-label">WAVE</span>
        <span class="hm-wave-name">2</span>
        <span class="hm-wave-date">5/11〜17</span>
      </div>

      <div class="hm-arrow" aria-hidden="true">›</div>

      <!-- WAVE 3 -->
      <div class="hm-wave">
        <span class="hm-wave-label">WAVE</span>
        <span class="hm-wave-name">3</span>
        <span class="hm-wave-date">5/18〜24</span>
      </div>

      <div class="hm-arrow" aria-hidden="true">›</div>

      <!-- WAVE 4 -->
      <div class="hm-wave">
        <span class="hm-wave-label">WAVE</span>
        <span class="hm-wave-name">4</span>
        <span class="hm-wave-date">5/25〜31</span>
      </div>

      <div class="hm-arrow" aria-hidden="true">›</div>

      <!-- WAVE 5 -->
      <div class="hm-wave">
        <span class="hm-wave-label">WAVE</span>
        <span class="hm-wave-name">5</span>
        <span class="hm-wave-date">6/1〜7</span>
      </div>

      <div class="hm-arrow" aria-hidden="true">›</div>

      <!-- 最後の審判（強調表示） -->
      <div class="hm-wave hm-final">
        <span class="hm-wave-label" style="color:#5a1010;">FINAL</span>
        <span class="hm-wave-name">最後の審判</span>
        <span class="hm-wave-date">6/13〜14</span>
      </div>

    </div><!-- /.hm-roadmap -->
  </div><!-- /.hm-roadmap-wrap -->

</section><!-- /.hm-section -->
