<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背景確認 | bg-preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; }

    .bg-block {
      width: 100%;
      height: 320px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }
    .bg-block .label {
      color: rgba(255,255,255,0.85);
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 3px;
      background: rgba(0,0,0,0.45);
      padding: 8px 24px;
      border-radius: 4px;
    }
    .bg-block .desc {
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      letter-spacing: 1px;
      background: rgba(0,0,0,0.3);
      padding: 4px 12px;
      border-radius: 3px;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       HERO：暗赤ダーク（深淵の炎・悪魔降臨）
       base: #0a0201 クリムゾン→暗紫グラデ
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .bg-hero {
      background:
        radial-gradient(ellipse 110% 50% at 50% -5%,  rgba(220,50,0,0.65) 0%, transparent 55%),
        radial-gradient(ellipse 55%  70% at 10% 100%, rgba(160,30,0,0.45) 0%, transparent 55%),
        radial-gradient(ellipse 55%  70% at 90% 100%, rgba(120,20,0,0.35) 0%, transparent 55%),
        linear-gradient(180deg, #0a0201 0%, #0e0302 40%, #07010e 100%);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       ABOUT：金琥珀ダーク（石造神殿・金の炬火）
       base: #070502 アンバー格子グラデ
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .bg-about {
      background:
        radial-gradient(ellipse 90% 40% at 50% 0%,    rgba(210,150,0,0.40) 0%, transparent 55%),
        repeating-linear-gradient(0deg,
          transparent 0px, transparent 79px,
          rgba(180,130,0,0.08) 79px, rgba(180,130,0,0.08) 80px),
        repeating-linear-gradient(90deg,
          transparent 0px, transparent 119px,
          rgba(180,130,0,0.08) 119px, rgba(180,130,0,0.08) 120px),
        linear-gradient(180deg, #070502 0%, #0e0b03 60%, #070502 100%);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       MACHINE：ピュアダーク（深淵・機種際立て）
       base: #070502 ほぼ黒
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .bg-machine {
      background: #070502;
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       PELORINA：深紫の悪魔神殿（ミスティック）
       base: #05030a 紫→暗藍グラデ
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .bg-pelorina {
      background:
        radial-gradient(ellipse 70% 50% at 50% 20%,  rgba(110,0,180,0.45) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 15% 80%,  rgba(80,0,130,0.35)  0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 85% 80%,  rgba(80,0,130,0.35)  0%, transparent 50%),
        repeating-linear-gradient(45deg,
          transparent 0px, transparent 39px,
          rgba(100,0,150,0.06) 39px, rgba(100,0,150,0.06) 40px),
        linear-gradient(180deg, #05030a 0%, #0a0416 60%, #05030a 100%);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       SCHEDULE：荘厳な儀式場（金の神殿）
       base: #080602 金格子グラデ
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .bg-schedule {
      background:
        radial-gradient(ellipse 80% 35% at 50% 0%,   rgba(210,150,0,0.42) 0%, transparent 50%),
        radial-gradient(ellipse 25% 100% at 3%  50%,  rgba(160,110,0,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 25% 100% at 97% 50%,  rgba(160,110,0,0.22) 0%, transparent 60%),
        repeating-linear-gradient(0deg,
          transparent 0px, transparent 99px,
          rgba(140,100,0,0.07) 99px, rgba(140,100,0,0.07) 100px),
        repeating-linear-gradient(90deg,
          transparent 0px, transparent 79px,
          rgba(140,100,0,0.07) 79px, rgba(140,100,0,0.07) 80px),
        linear-gradient(180deg, #080602 0%, #0e0b02 50%, #080602 100%);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       WAVE RESULTS：深淵の間（審判前夜・紺藍）
       base: #040408 紺藍グラデ
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .bg-wave {
      background:
        radial-gradient(ellipse 70% 40% at 50% 10%,  rgba(0,50,160,0.45) 0%, transparent 55%),
        radial-gradient(ellipse 40% 50% at 20% 80%,  rgba(0,30,100,0.32)  0%, transparent 50%),
        linear-gradient(180deg, #040408 0%, #050710 60%, #040408 100%);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       FINALISTS：炎の審判場（深紅・最後の審判）
       base: #0a0101 深紅グラデ
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .bg-finalists {
      background:
        radial-gradient(ellipse 90% 50% at 50% 0%,   rgba(220,20,0,0.65)  0%, transparent 55%),
        radial-gradient(ellipse 40% 60% at 10% 100%, rgba(180,20,0,0.50)   0%, transparent 55%),
        radial-gradient(ellipse 40% 60% at 90% 100%, rgba(180,20,0,0.50)   0%, transparent 55%),
        radial-gradient(ellipse 60% 30% at 50% 100%, rgba(240,50,0,0.35)   0%, transparent 50%),
        linear-gradient(180deg, #0a0101 0%, #100202 45%, #0a0101 100%);
    }
  </style>
</head>
<body>

  <!-- HERO：深淵クリムゾン -->
  <div class="bg-block bg-hero">
    <span class="label">HERO</span>
    <span class="desc">深淵クリムゾン — 暗赤＋暗紫ベース (#0a0201)</span>
  </div>

  <!-- ABOUT：金琥珀神殿 -->
  <div class="bg-block bg-about">
    <span class="label">ABOUT（企画概要）</span>
    <span class="desc">金琥珀神殿 — アンバー格子 (#070502)</span>
  </div>

  <!-- MACHINE：ピュアダーク -->
  <div class="bg-block bg-machine">
    <span class="label">MACHINE（対象機種）</span>
    <span class="desc">ピュアダーク — ほぼ黒 (#070502)</span>
  </div>

  <!-- PELORINA：深紫悪魔神殿 -->
  <div class="bg-block bg-pelorina">
    <span class="label">PELORINA（兎味ペロリナ）</span>
    <span class="desc">深紫悪魔神殿 — パープル＋インディゴ (#05030a)</span>
  </div>

  <!-- SCHEDULE：金の儀式場 -->
  <div class="bg-block bg-schedule">
    <span class="label">SCHEDULE（開催スケジュール）</span>
    <span class="desc">金の儀式場 — アンバー格子 (#080602)</span>
  </div>

  <!-- WAVE RESULTS：深淵紺藍 -->
  <div class="bg-block bg-wave">
    <span class="label">WAVE RESULTS（WAVE結果）</span>
    <span class="desc">深淵紺藍 — ネイビー＋インディゴ (#040408)</span>
  </div>

  <!-- FINALISTS：炎の審判場 -->
  <div class="bg-block bg-finalists">
    <span class="label">FINALISTS（最後の審判）</span>
    <span class="desc">炎の審判場 — 深紅＋オレンジ (#0a0101)</span>
  </div>

</body>
</html>
